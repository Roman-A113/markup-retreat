<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Rating Stars</title>
  <style>
    .rating {
      display: flex;
      gap: 10px;
    }

    .star {
      width: 60px;
      height: 60px;
      cursor: pointer;
      transition: transform 0.2s;
    }
  </style>
</head>

<body>
  <div class="rating">
    <img src="img/star-empty.png" class="star" data-rating="1">
    <img src="img/star-empty.png" class="star" data-rating="2">
    <img src="img/star-empty.png" class="star" data-rating="3">
    <img src="img/star-empty.png" class="star" data-rating="4">
    <img src="img/star-empty.png" class="star" data-rating="5">
  </div>

  <script>
    const stars = document.querySelectorAll('.star');
    let currentRating = 0;

    function setRating(rating) {
      stars.forEach((star, index) => {
        if (index < rating) {
          star.src = 'img/star.png';
        } else {
          star.src = 'img/star-empty.png';
        }
      });
    }

    stars.forEach((star, index) => {
      star.onclick = () => {
        currentRating = index + 1;
        setRating(currentRating);
      };

      star.onmouseenter = () => {
        setRating(index + 1);
      };
    });

    document.querySelector('.rating').onmouseleave = () => {
      setRating(currentRating);
    };
  </script>
</body>

</html>
